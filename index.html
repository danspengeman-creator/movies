<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Movies Right Now</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --purple-light: #ede9fe;
  --purple-dark: #6d28d9;
  --teal-light: #ccfbf1;
  --teal-dark: #0f766e;
  --yellow-light: #fef3c7;
  --bg: #fff9fb;
  --card-bg: #ffffff;
  --text: #1e1b4b;
  --text-muted: #6b7280;
  --shadow: 0 4px 20px rgba(167,139,250,0.12);
  --shadow-hover: 0 8px 32px rgba(167,139,250,0.22);
  --radius: 20px;
  --radius-sm: 12px;
}

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 80px;
  overscroll-behavior-y: contain;
}

/* ── Pull to refresh ── */
#ptr-indicator {
  text-align: center;
  padding: 0;
  height: 0;
  overflow: hidden;
  transition: height 0.2s, padding 0.2s;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--bg);
}
#ptr-indicator.visible { height: 52px; padding: 10px 0; }
#ptr-indicator.spinning .ptr-arrow { animation: spin 0.7s linear infinite; }
.ptr-arrow { display: inline-block; font-size: 18px; }

header {
  background: linear-gradient(135deg, #7c3aed 0%, #db2777 60%, #f59e0b 100%);
  padding: 28px 20px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
header::after {
  content: '';
  position: absolute;
  bottom: -50px; left: -30px;
  width: 150px; height: 150px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.header-emoji { font-size: 40px; display: block; margin-bottom: 6px; position: relative; z-index: 1; }
header h1 {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(26px, 6vw, 38px);
  color: #fff;
  line-height: 1.15;
  position: relative;
  z-index: 1;
  letter-spacing: -0.5px;
}
header p { color: rgba(255,255,255,0.85); font-size: 14px; margin-top: 6px; position: relative; z-index: 1; }

.tabs {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 16px 0;
}
.tab {
  flex-shrink: 0;
  padding: 9px 18px;
  border-radius: 100px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  border: 2px solid #e9d5ff;
  cursor: pointer;
  background: #fff;
  color: var(--text-muted);
  transition: all 0.2s;
}
.tab.active {
  background: linear-gradient(135deg, #7c3aed, #db2777);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(124,58,237,0.35);
}
.tab:not(.active):hover { border-color: #a78bfa; color: var(--purple-dark); }

.rating-toggle {
  padding: 5px 14px;
  border-radius: 100px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  border: 2px solid #e9d5ff;
  cursor: pointer;
  background: #fff;
  color: var(--text-muted);
  transition: all 0.2s;
}
.rating-toggle.active { background: #1e1b4b; color: #fff; border-color: transparent; }
.rating-toggle:not(.active):hover { border-color: #a78bfa; color: var(--purple-dark); }

.main { padding: 16px; }

#refresh-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 auto 20px;
  padding: 11px 22px;
  border-radius: 100px;
  border: 2px solid #e9d5ff;
  background: #fff;
  color: #7c3aed;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
#refresh-btn:hover { background: #f5f3ff; border-color: #a78bfa; }
#refresh-btn:disabled { opacity: 0.55; cursor: not-allowed; }
#refresh-btn .spin { display: inline-block; }
#refresh-btn.loading .spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.section-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 20px 0 12px;
}

.loading-state { text-align: center; padding: 60px 20px; }
.loading-state .loader {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 4px solid #e9d5ff;
  border-top-color: #7c3aed;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
.loading-state p { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px; color: var(--text-muted); }

.error-state {
  background: #fff1f2;
  border: 1.5px solid #fecdd3;
  border-radius: var(--radius-sm);
  padding: 20px;
  text-align: center;
  margin: 20px 0;
}
.error-state p { color: #be123c; font-weight: 600; font-size: 14px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-weight: 600; font-size: 14px; }

.movies-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
@media (min-width: 540px) { .movies-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px) { .movies-grid { grid-template-columns: repeat(3, 1fr); } }

.movie-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1.5px solid #f3e8ff;
  padding: 18px;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.movie-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.movie-card.theater::before   { background: linear-gradient(90deg, #7c3aed, #db2777); }
.movie-card.streaming::before { background: linear-gradient(90deg, #0f766e, #2563eb); }
.movie-card.coming::before    { background: linear-gradient(90deg, #f59e0b, #ef4444); }
.movie-card:hover  { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.movie-card:active { transform: scale(0.98); }

.card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }

.movie-poster-thumb {
  width: 54px; height: 78px;
  border-radius: 10px;
  flex-shrink: 0;
  background: linear-gradient(135deg, #e9d5ff, #fce7f3);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.movie-poster-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.card-info { flex: 1; min-width: 0; }
.movie-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 5px;
}

.badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 100px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 11px;
  white-space: nowrap;
}
.badge-g      { background: #dcfce7; color: #166534; }
.badge-pg     { background: #dbeafe; color: #1e40af; }
.badge-pg13   { background: var(--yellow-light); color: #92400e; }
.badge-nr     { background: #f3f4f6; color: #4b5563; }
.badge-theater  { background: var(--purple-light); color: var(--purple-dark); }
.badge-platform { background: var(--teal-light); color: var(--teal-dark); font-size: 10px; }
.badge-coming   { background: #fff7ed; color: #c2410c; }

.movie-stars { color: #f59e0b; font-size: 12px; }

.card-teaser {
  font-size: 13px;
  color: #6b7280;
  line-height: 1.5;
  border-top: 1px solid #f3e8ff;
  padding-top: 10px;
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tap-hint { font-size: 11px; color: #a78bfa; font-weight: 700; margin-top: 8px; }

.last-updated { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 28px; padding-top: 16px; border-top: 1px solid #f3e8ff; }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,40,0.72);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
@media (min-width: 600px) { .modal-overlay { align-items: center; padding: 20px; } }

.modal {
  background: #fff;
  border-radius: 28px 28px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
  -webkit-overflow-scrolling: touch;
}
@media (min-width: 600px) { .modal { border-radius: 28px; max-height: 88vh; } }
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(0,0,0,0.22);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #fff;
  z-index: 10;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(0,0,0,0.38); }

.modal-hero {
  width: 100%;
  height: 280px;
  position: relative;
  background: linear-gradient(135deg, #e9d5ff 0%, #fce7f3 100%);
  border-radius: 28px 28px 0 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
}
.modal-hero img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.modal-hero-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100px;
  background: linear-gradient(to top, #fff 0%, transparent 100%);
  pointer-events: none;
}

.modal-body { padding: 20px 22px 36px; }
.modal-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.modal-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 22px;
  line-height: 1.2;
  color: var(--text);
  flex: 1;
}
.modal-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.modal-description { font-size: 15px; line-height: 1.7; color: #374151; margin-bottom: 18px; }

.modal-meta {
  background: #f9f5ff;
  border-radius: 14px;
  padding: 14px 16px;
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}
.modal-meta-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
.modal-meta-label { color: var(--text-muted); font-weight: 600; }
.modal-meta-value { color: var(--text); font-weight: 700; text-align: right; max-width: 65%; }

.modal-footer { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

.modal-platforms { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.platform-pill {
  padding: 6px 14px;
  border-radius: 100px;
  background: linear-gradient(135deg, #0f766e, #2563eb);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
}
.theater-pill {
  padding: 6px 14px;
  border-radius: 100px;
  background: #dbeafe;
  color: #1e40af;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
}
.coming-pill {
  padding: 6px 14px;
  border-radius: 100px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
}

/* Email button */
.email-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 100px;
  background: #f0fdf4;
  color: #166534;
  border: 2px solid #bbf7d0;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.email-btn.visible { display: inline-flex; }
.email-btn:hover { opacity: 0.82; }

/* Tickets button */
.tickets-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 100px;
  background: linear-gradient(135deg, #7c3aed, #db2777);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.tickets-btn.visible { display: inline-flex; }
.tickets-btn:hover { opacity: 0.88; }

/* Trailer button */
.trailer-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 100px;
  background: #ff0000;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.trailer-btn.visible { display: inline-flex; }
.trailer-btn:hover { opacity: 0.88; }
.trailer-btn svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }

/* Video embed */
.trailer-embed {
  display: none;
  margin-top: 16px;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 16/9;
  background: #000;
}
.trailer-embed.visible { display: block; }
.trailer-embed iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div id="ptr-indicator">
  <span class="ptr-arrow">↻</span>
  <span id="ptr-text">Pull to refresh</span>
</div>

<header>
  <span class="header-emoji">🍿</span>
  <h1>Kids Movies Right Now</h1>
  <p>In theaters and on streaming</p>
</header>

<div style="padding: 0 16px;">
  <div class="tabs">
    <button class="tab active" data-tab="all">All Movies</button>
    <button class="tab" data-tab="theaters">In Theaters</button>
    <button class="tab" data-tab="streaming">Streaming</button>
    <button class="tab" data-tab="coming">Coming Soon</button>
  </div>
  <div style="display:flex; justify-content:center; align-items:center; gap:10px; padding: 10px 2px 0;">
    <span style="font-family:'Nunito',sans-serif; font-weight:700; font-size:12px; color:var(--text-muted);">Max rating:</span>
    <div style="display:flex; gap:6px;">
      <button class="rating-toggle active" data-max="PG">G &amp; PG</button>
      <button class="rating-toggle" data-max="PG-13">+ PG-13</button>

</div>

<div class="main">
  <div style="text-align:center; margin: 16px 0 4px;">
    <button id="refresh-btn"><span class="spin">↻</span> Refresh</button>
  </div>
  <div id="content">
    <div class="loading-state"><div class="loader"></div><p>Loading movies...</p></div>
  </div>
  <p class="last-updated" id="last-updated" style="display:none;"></p>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-hero" id="modal-hero">
      <span id="modal-emoji"></span>
      <div class="modal-hero-fade"></div>
    </div>
    <div class="modal-body">
      <div class="modal-title-row">
        <div class="modal-title" id="modal-title"></div>
        <a class="tickets-btn" id="tickets-btn" target="_blank" rel="noopener">🎟 Get tickets</a>
      </div>
      <div class="modal-badges"      id="modal-badges"></div>
      <p class="modal-description"   id="modal-description"></p>
      <div class="modal-meta"        id="modal-meta" style="display:none;"></div>
      <div class="modal-footer">
        <div class="modal-platforms" id="modal-platforms"></div>
        <a class="email-btn" id="email-btn">
          📧 Email me this
        </a>
        <a class="trailer-btn" id="trailer-btn" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
          Watch trailer
        </a>
      </div>
      <div class="trailer-embed" id="trailer-embed">
        <iframe id="trailer-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
const TOKEN   = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJhNzA4Y2I0NDlhYjFmZjhmYTkxMjUyNTIwMGM2NTFkMCIsIm5iZiI6MTc3NDk3Nzg0OS4wNDMsInN1YiI6IjY5Y2MwMzM5OTk1ZWZmMWRiOTRjMDUzYyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.Hl4LaHCBaxtNaFVwOHN3ZUkjnyGJ7K-4w0uLqZxSUyo';
const BASE    = 'https://api.themoviedb.org/3';
const IMG     = 'https://image.tmdb.org/t/p/';
const HEADERS = { Authorization: `Bearer ${TOKEN}` };

const OK_RATINGS    = new Set(['G','PG','PG-13']);
const FAMILY_GENRES = new Set([16, 10751, 12, 14, 35, 878]);

const PROVIDERS = {
  8:'Netflix', 9:'Prime Video', 337:'Disney+', 15:'Hulu',
  386:'Peacock', 1899:'Max', 2:'Apple TV+', 531:'Paramount+'
};
const PROVIDER_IDS = new Set(Object.keys(PROVIDERS).map(Number));

let allMovies  = [];
let activeTab  = 'all';
let maxRating  = 'PG';

// ── TMDB ──
async function tmdb(path, params = {}) {
  const qs = Object.entries(params)
    .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
    .join('&');
  const url = BASE + path + (qs ? '?' + qs : '');
  const r = await fetch(url, { headers: HEADERS });
  if (!r.ok) throw new Error(`TMDB ${r.status}`);
  return r.json();
}

async function getCert(id) {
  try {
    const d = await tmdb(`/movie/${id}/release_dates`);
    const us = d.results?.find(r => r.iso_3166_1 === 'US');
    return us?.release_dates?.find(r => r.certification)?.certification || null;
  } catch { return null; }
}

async function getProviders(id) {
  try {
    const d = await tmdb(`/movie/${id}/watch/providers`);
    return (d.results?.US?.flatrate || [])
      .filter(p => PROVIDER_IDS.has(p.provider_id))
      .map(p => PROVIDERS[p.provider_id]);
  } catch { return []; }
}

async function getDetails(id) {
  try {
    const d = await tmdb(`/movie/${id}`, { append_to_response: 'credits' });
    return {
      director: d.credits?.crew?.find(c => c.job === 'Director')?.name || null,
      genres:   d.genres?.map(g => g.name).join(', ') || null,
      runtime:  d.runtime ? `${Math.floor(d.runtime/60)}h ${d.runtime%60}m` : null,
    };
  } catch { return {}; }
}

async function getTrailerKey(id) {
  try {
    const d = await tmdb(`/movie/${id}/videos`);
    const trailer = d.results?.find(v =>
      v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser') && v.official !== false
    );
    return trailer?.key || null;
  } catch { return null; }
}

function sixMonthsAgo() {
  const d = new Date(); d.setMonth(d.getMonth() - 6);
  return d.toISOString().split('T')[0];
}
function inThreeMonths() {
  const d = new Date(); d.setMonth(d.getMonth() + 3);
  return d.toISOString().split('T')[0];
}
function today() {
  return new Date().toISOString().split('T')[0];
}

function isFamilyGenre(m) {
  return m.genre_ids?.some(id => FAMILY_GENRES.has(id));
}

// ── Fetch ──
async function fetchMovies() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('content').innerHTML =
    '<div class="loading-state"><div class="loader"></div><p>Loading movies...</p></div>';

  try {
    // Theater + streaming candidates
    const [np1, np2, s1, s2, up1, up2] = await Promise.all([
      tmdb('/movie/now_playing', { language:'en-US', region:'US', page:1 }),
      tmdb('/movie/now_playing', { language:'en-US', region:'US', page:2 }),
      tmdb('/discover/movie', { language:'en-US', region:'US', with_genres:'16|10751',
        watch_region:'US', with_watch_monetization_types:'flatrate',
        with_original_language:'en',
        sort_by:'popularity.desc', 'primary_release_date.gte': sixMonthsAgo(), page:1 }),
      tmdb('/discover/movie', { language:'en-US', region:'US', with_genres:'12|14|35',
        watch_region:'US', with_watch_monetization_types:'flatrate',
        with_original_language:'en',
        sort_by:'popularity.desc', 'primary_release_date.gte': sixMonthsAgo(), page:1 }),
      // Coming soon: family genres releasing from today through ~3 months out
      tmdb('/discover/movie', { language:'en-US', region:'US', with_genres:'16|10751|12',
        with_original_language:'en',
        'release_date.gte': today(),
        'release_date.lte': inThreeMonths(),
        with_release_type: '3|2',
        sort_by:'primary_release_date.asc', page:1 }),
      tmdb('/discover/movie', { language:'en-US', region:'US', with_genres:'14|35',
        with_original_language:'en',
        'release_date.gte': today(),
        'release_date.lte': inThreeMonths(),
        with_release_type: '3|2',
        sort_by:'primary_release_date.asc', page:1 }),
    ]);

    const isEnglish = m => m.original_language === 'en';

    const theaterCandidates = [...(np1.results||[]), ...(np2.results||[])]
      .filter(m => isFamilyGenre(m) && isEnglish(m)).slice(0, 24);

    const streamingMap = new Map();
    [...(s1.results||[]), ...(s2.results||[])].forEach(m => streamingMap.set(m.id, m));
    const streamingCandidates = [...streamingMap.values()].filter(isEnglish).slice(0, 32);

    const comingMap = new Map();
    [...(up1.results||[]), ...(up2.results||[])].forEach(m => comingMap.set(m.id, m));
    const comingCandidates = [...comingMap.values()]
      .filter(m => isFamilyGenre(m) && isEnglish(m)).slice(0, 24);

    // Certifications in parallel
    const [tCerts, sCerts, cCerts] = await Promise.all([
      Promise.all(theaterCandidates.map(m => getCert(m.id))),
      Promise.all(streamingCandidates.map(m => getCert(m.id))),
      Promise.all(comingCandidates.map(m => getCert(m.id))),
    ]);

    const theaterMovies = theaterCandidates
      .map((m,i) => ({ ...m, cert: tCerts[i] }))
      .filter(m => !m.cert || OK_RATINGS.has(m.cert));

    const theaterIds = new Set(theaterMovies.map(m => m.id));

    const streamingWithCerts = streamingCandidates
      .map((m,i) => ({ ...m, cert: sCerts[i] }))
      .filter(m => !m.cert || OK_RATINGS.has(m.cert))
      .filter(m => !theaterIds.has(m.id));

    const providerLists = await Promise.all(
      streamingWithCerts.map(m => getProviders(m.id))
    );

    const streamingMovies = streamingWithCerts
      .map((m,i) => ({ ...m, providers: providerLists[i] }))
      .filter(m => m.providers.length > 0);

    const comingMovies = comingCandidates
      .map((m,i) => ({ ...m, cert: cCerts[i] }))
      .filter(m => !m.cert || OK_RATINGS.has(m.cert))
      .filter(m => !theaterIds.has(m.id));

    function mapMovie(m, where, platforms) {
      return {
        id: m.id, title: m.title, where,
        rating: m.cert, overview: m.overview,
        poster: m.poster_path, backdrop: m.backdrop_path,
        vote: m.vote_average, releaseDate: m.release_date,
        genre_ids: m.genre_ids, platforms,
      };
    }

    allMovies = [
      ...theaterMovies.map(m => mapMovie(m, 'theater', [])),
      ...streamingMovies.map(m => mapMovie(m, 'streaming', m.providers)),
      ...comingMovies.map(m => mapMovie(m, 'coming', [])),
    ];

    renderMovies();

    const lu = document.getElementById('last-updated');
    lu.style.display = 'block';
    lu.textContent = `Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} — ${theaterMovies.length} in theaters, ${streamingMovies.length} streaming, ${comingMovies.length} coming soon`;

  } catch(err) {
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <p>Could not load movie data. Please try again.</p>
        <p style="font-size:12px;margin-top:6px;color:#9ca3af;">${err.message}</p>
      </div>`;
  }
  btn.disabled = false;
  btn.classList.remove('loading');
}

// ── Render helpers ──
function ratingClass(r) {
  if (!r) return 'badge-nr';
  if (r === 'G') return 'badge-g';
  if (r === 'PG') return 'badge-pg';
  if (r === 'PG-13') return 'badge-pg13';
  return 'badge-nr';
}

function emoji(m) {
  const g = m.genre_ids || [];
  if (g.includes(16))    return '🎨';
  if (g.includes(14))    return '🧙';
  if (g.includes(12))    return '🌍';
  if (g.includes(10751)) return '👨‍👩‍👧';
  if (g.includes(35))    return '😄';
  return '🎬';
}

function stars(v) {
  const n = Math.round(v / 2);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

// ── Render ──
function renderMovies() {
  const content = document.getElementById('content');

  const ratingOrder = ['G','PG','PG-13'];
  const maxIdx  = ratingOrder.indexOf(maxRating);
  const allowed = new Set(ratingOrder.slice(0, maxIdx + 1));
  const ratingOk = m => !m.rating || allowed.has(m.rating);

  const theater  = allMovies.filter(m => m.where === 'theater'  && ratingOk(m));
  const streaming = allMovies.filter(m => m.where === 'streaming' && ratingOk(m));
  const coming    = allMovies.filter(m => m.where === 'coming'    && ratingOk(m));

  let groups;
  if (activeTab === 'all') {
    groups = [['In Theaters Now', theater, 'theater'], ['New to Streaming', streaming, 'streaming']];
  } else if (activeTab === 'theaters') {
    groups = [['In Theaters Now', theater, 'theater']];
  } else if (activeTab === 'streaming') {
    groups = [['New to Streaming', streaming, 'streaming']];
  } else {
    groups = [['Coming Soon', coming, 'coming']];
  }

  let html = '';
  for (const [label, movies] of groups) {
    if (!movies.length) continue;
    html += `<p class="section-label">${label}</p><div class="movies-grid">`;
    movies.forEach(m => {
      const thumb = m.poster ? `${IMG}w185${m.poster}` : null;
      const imgHtml = thumb
        ? `<img src="${thumb}" alt="${esc(m.title)}" loading="lazy">`
        : `<span>${emoji(m)}</span>`;
      let whereBadge = '';
      if (m.where === 'theater') {
        whereBadge = `<span class="badge badge-theater">🎬 In theaters</span>`;
      } else if (m.where === 'streaming') {
        whereBadge = m.platforms.map(p => `<span class="badge badge-platform">${p}</span>`).join('');
      } else {
        const rd = formatDate(m.releaseDate);
        whereBadge = `<span class="badge badge-coming">🗓 ${rd || 'Coming soon'}</span>`;
      }
      html += `
        <div class="movie-card ${m.where}" data-id="${m.id}">
          <div class="card-top">
            <div class="movie-poster-thumb">${imgHtml}</div>
            <div class="card-info">
              <div class="movie-title">${esc(m.title)}</div>
              <div class="badges">
                ${m.rating ? `<span class="badge ${ratingClass(m.rating)}">${m.rating}</span>` : '<span class="badge badge-nr">NR</span>'}
                ${whereBadge}
              </div>
              ${m.vote ? `<div class="movie-stars">${stars(m.vote)} <span style="font-size:11px;color:var(--text-muted);">${m.vote.toFixed(1)}</span></div>` : ''}
            </div>
          </div>
          ${m.overview ? `<p class="card-teaser">${esc(m.overview)}</p>` : ''}
          <p class="tap-hint">↗ Tap for details</p>
        </div>`;
    });
    html += '</div>';
  }

  if (!html) html = '<div class="empty-state">No movies found in this category.</div>';
  content.innerHTML = html;

  content.querySelectorAll('.movie-card').forEach(card => {
    card.addEventListener('click', () => {
      const m = allMovies.find(x => x.id === parseInt(card.dataset.id));
      if (m) openModal(m);
    });
  });
}

// ── Modal ──
async function openModal(movie) {
  const overlay  = document.getElementById('modal-overlay');
  const hero     = document.getElementById('modal-hero');
  const emojiEl  = document.getElementById('modal-emoji');
  const trailerBtn   = document.getElementById('trailer-btn');
  const ticketsBtn   = document.getElementById('tickets-btn');
  const emailBtn     = document.getElementById('email-btn');
  const trailerEmbed = document.getElementById('trailer-embed');
  const trailerFrame = document.getElementById('trailer-iframe');

  document.getElementById('modal-title').textContent       = movie.title;
  document.getElementById('modal-description').textContent = movie.overview || '';

  // Reset hero image
  hero.querySelectorAll('img').forEach(i => i.remove());
  emojiEl.textContent  = emoji(movie);
  emojiEl.style.display = '';

  const src = movie.backdrop
    ? `${IMG}w780${movie.backdrop}`
    : movie.poster ? `${IMG}w500${movie.poster}` : null;
  if (src) {
    const img = new Image();
    img.alt = movie.title;
    img.onload = () => {
      emojiEl.style.display = 'none';
      hero.insertBefore(img, hero.querySelector('.modal-hero-fade'));
    };
    img.src = src;
  }

  // Reset trailer + tickets + email
  trailerBtn.classList.remove('visible');
  ticketsBtn.classList.remove('visible');
  emailBtn.classList.remove('visible');
  trailerEmbed.classList.remove('visible');
  trailerFrame.src = '';

  // Tickets button — theater movies only
  if (movie.where === 'theater') {
    const query = encodeURIComponent(movie.title);
    ticketsBtn.href = `https://www.fandango.com/search?q=${query}`;
    ticketsBtn.classList.add('visible');
  }

  // Email button — all movies
  const rd = formatDate(movie.releaseDate);
  let body = `${movie.title}\n`;
  if (movie.where === 'theater') {
    body += `Now playing in theaters`;
    if (rd) body += ` (released ${rd})`;
  } else if (movie.where === 'coming') {
    body += `Coming soon`;
    if (rd) body += ` — releases ${rd}`;
  } else {
    if (rd) body += `Released: ${rd}\n`;
    if (movie.platforms && movie.platforms.length) {
      body += `Streaming on: ${movie.platforms.join(', ')}`;
    }
  }
  emailBtn.href = `mailto:danspengeman@gmail.com?subject=${encodeURIComponent('Movie to find')}&body=${encodeURIComponent(body)}`;
  emailBtn.classList.add('visible');

  // Badges
  document.getElementById('modal-badges').innerHTML = `
    <span class="badge ${ratingClass(movie.rating)}">${movie.rating || 'NR'}</span>
    ${movie.vote ? `<span class="badge" style="background:#fef3c7;color:#92400e;">★ ${movie.vote.toFixed(1)}</span>` : ''}
  `;

  // Platforms / where pill
  const platEl = document.getElementById('modal-platforms');
  if (movie.where === 'theater') {
    platEl.innerHTML = '<span class="theater-pill">🎬 In theaters</span>';
  } else if (movie.where === 'coming') {
    const rd = formatDate(movie.releaseDate);
    platEl.innerHTML = `<span class="coming-pill">🗓 ${rd || 'Coming soon'}</span>`;
  } else {
    platEl.innerHTML = (movie.platforms||[]).map(p => `<span class="platform-pill">${p}</span>`).join('');
  }

  // Meta
  function buildMeta(extra = {}) {
    const rows = [];
    if (extra.genres)           rows.push(['Genre',    extra.genres]);
    if (extra.runtime)          rows.push(['Runtime',  extra.runtime]);
    const rd = formatDate(movie.releaseDate);
    if (rd)                     rows.push(['Released', rd]);
    if (extra.director)         rows.push(['Director', extra.director]);
    const metaEl = document.getElementById('modal-meta');
    if (!rows.length) { metaEl.style.display = 'none'; return; }
    metaEl.style.display = 'grid';
    metaEl.innerHTML = rows.map(([l,v]) => `
      <div class="modal-meta-row">
        <span class="modal-meta-label">${l}</span>
        <span class="modal-meta-value">${esc(String(v))}</span>
      </div>`).join('');
  }
  buildMeta();

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch details and trailer key in parallel
  const [extra, trailerKey] = await Promise.all([
    getDetails(movie.id).catch(() => ({})),
    getTrailerKey(movie.id).catch(() => null),
  ]);

  buildMeta(extra);

  if (trailerKey) {
    trailerBtn.classList.add('visible');
    trailerBtn.onclick = (e) => {
      e.preventDefault();
      trailerEmbed.classList.toggle('visible');
      if (trailerEmbed.classList.contains('visible')) {
        trailerFrame.src = `https://www.youtube.com/embed/${trailerKey}?autoplay=1`;
      } else {
        trailerFrame.src = '';
      }
    };
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  // Stop trailer playback
  document.getElementById('trailer-iframe').src = '';
  document.getElementById('trailer-embed').classList.remove('visible');
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Tabs & filters ──
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  activeTab = t.dataset.tab;
  renderMovies();
}));

document.querySelectorAll('.rating-toggle').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.rating-toggle').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  maxRating = t.dataset.max;
  renderMovies();
}));

document.getElementById('refresh-btn').addEventListener('click', fetchMovies);

// ── Pull to refresh ──
(function() {
  let startY = 0;
  let pulling = false;
  const THRESHOLD = 72;
  const ptr = document.getElementById('ptr-indicator');
  const ptrText = document.getElementById('ptr-text');

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if (dist > 10) {
      const clamped = Math.min(dist, THRESHOLD + 20);
      const h = Math.min(clamped * 0.6, 52);
      ptr.style.height = h + 'px';
      ptr.style.padding = (h > 10 ? '10px 0' : '0');
      ptrText.textContent = dist >= THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
      ptr.querySelector('.ptr-arrow').style.transform = `rotate(${Math.min(dist * 2, 180)}deg)`;
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dist = e.changedTouches[0].clientY - startY;
    if (dist >= THRESHOLD) {
      ptr.classList.add('visible', 'spinning');
      ptrText.textContent = 'Refreshing...';
      fetchMovies().then(() => {
        ptr.classList.remove('visible', 'spinning');
        ptr.style.height = '';
        ptr.style.padding = '';
      });
    } else {
      ptr.style.height = '';
      ptr.style.padding = '';
    }
  }, { passive: true });
})();

fetchMovies();
</script>
